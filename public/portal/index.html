<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora Studio — Klientų portalas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="login-header">
                <span class="logo-text">Velora Studio</span>
                <p>Klientų portalas</p>
            </div>
            <div class="login-body">
                <p class="login-desc">Prisijunkite su Google paskyra, kuri buvo naudota registracijai.</p>
                <div id="googleBtnWrap" class="google-btn-wrap"></div>
                <p id="loginError" class="login-error"></p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard" style="display:none;">
        <!-- Header -->
        <header class="portal-header">
            <div class="header-left">
                <span class="logo-text">Velora Studio</span>
                <span class="header-sep">|</span>
                <span class="header-label">Klientų portalas</span>
            </div>
            <div class="header-right">
                <img id="userPicture" class="user-avatar" src="" alt="">
                <span id="userName" class="user-name"></span>
                <button id="logoutBtn" class="btn btn-ghost">Atsijungti</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="portal-main">
            <!-- Profile + Plan Card (reference style) -->
            <div class="profile-card" id="profileCard">
                <div class="profile-top">
                    <img id="profilePicture" class="profile-avatar" src="" alt="">
                    <div class="profile-info">
                        <span class="profile-name" id="profileName"></span>
                        <span class="profile-plan" id="profilePlan">START planas</span>
                    </div>
                </div>

                <!-- Changes progress bar -->
                <div class="credits-section" id="creditsSection">
                    <a class="credits-row" id="creditsRow" href="#changes-section">
                        <span class="credits-label" id="creditsLabel">Liko pakeitimų</span>
                        <span class="credits-arrow">›</span>
                    </a>
                    <div class="credits-bar">
                        <div class="credits-bar-track">
                            <div class="credits-bar-fill" id="creditsFill" style="width: 100%"></div>
                        </div>
                    </div>
                </div>

                <!-- Upgrade row (shown when out of changes or START plan) -->
                <div class="upgrade-row" id="upgradeRow" style="display:none;">
                    <div class="upgrade-row-left">
                        <span class="upgrade-icon">⚡</span>
                        <span class="upgrade-text">Atnaujinti planą</span>
                    </div>
                    <a href="/#kainos" target="_blank" class="upgrade-btn">Atnaujinti</a>
                </div>

                <!-- Menu links -->
                <div class="profile-menu">
                    <a href="#changes-section" class="profile-menu-item" id="menuChanges">
                        <span class="menu-icon">📝</span>
                        <span>Pakeitimų užklausos</span>
                    </a>
                    <a href="#" class="profile-menu-item" id="menuSalon">
                        <span class="menu-icon">💇</span>
                        <span id="menuSalonName">Jūsų salonas</span>
                    </a>
                    <button class="profile-menu-item menu-logout" id="logoutBtn2">
                        <span class="menu-icon">↩</span>
                        <span>Atsijungti</span>
                    </button>
                </div>
            </div>

            <!-- New Change Request -->
            <div class="section-card" id="newRequestSection" style="display:none;">
                <h3 class="section-title">Naujas pakeitimas</h3>
                <form id="changeForm" class="change-form">
                    <div class="form-group">
                        <label for="changeCategory">Kategorija</label>
                        <select id="changeCategory" required>
                            <option value="" disabled selected>Pasirinkite...</option>
                            <option value="text">Teksto pakeitimai</option>
                            <option value="visual">Vizualiniai pakeitimai</option>
                            <option value="service">Paslaugos / kainos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="changeDesc">Aprašymas</label>
                        <textarea id="changeDesc" rows="4" placeholder="Aprašykite, ką norėtumėte pakeisti..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Pateikti užklausą</button>
                </form>
            </div>

            <!-- Change History -->
            <div class="section-card" id="changes-section">
                <h3 class="section-title">Pakeitimų istorija</h3>
                <div id="changesList" class="changes-list">
                    <p class="empty-state">Kraunama...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Puslapis nerastas | Velora Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23060a12'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='%2322d3ee' font-family='serif'>V</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #060a12;
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
            padding: 24px;
        }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 600;
            color: #22d3ee;
            line-height: 1;
            text-shadow: 0 0 60px rgba(34, 211, 238, 0.3);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin: 16px 0 12px;
            color: #f8fafc;
        }
        p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #22d3ee;
            color: #060a12;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 211, 238, 0.3);
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <h1>Puslapis nerastas</h1>
    <p>Atsiprašome, bet šis puslapis neegzistuoja arba buvo perkeltas.</p>
    <a href="/" class="btn">Grįžti į pradžią</a>
